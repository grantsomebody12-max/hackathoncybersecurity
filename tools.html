<!DOCTYPE html>
<html>
<head>
<title>Tools | CyberShield</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}
body{background: linear-gradient(270deg,#02040a,#071a2f,#02040a);background-size:600% 600%;animation:bg 12s ease infinite;color:white;padding-top: 80px;}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes slideUp{0%{opacity:0;transform:translateY(40px);}100%{opacity:1;transform:translateY(0);}}
@keyframes gaugePulse{
0%{box-shadow:0 0 15px var(--gauge-color, #22c55e);transform:scale(1);}
50%{box-shadow:0 0 40px var(--gauge-color, #22c55e);transform:scale(1.03);}
100%{box-shadow:0 0 15px var(--gauge-color, #22c55e);transform:scale(1);}
}
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);position:fixed;width:100%;top:0;z-index:100;}
nav .logo{
  font-family:Orbitron;
  color:#00f7ff;
  font-size: 2em;
  font-weight: bold;
  text-decoration: none;
  margin-left: 0;
}
nav a{color:white;margin-left:20px;text-decoration:none;font-weight:600;transition:color 0.3s ease;}
nav a:hover{color:#00f7ff;}
.section{padding:40px;width:80%;max-width:1400px;margin: 0 auto;text-align:center;}
.section h2{font-size:2.5rem;margin-bottom:20px;font-family:Orbitron;color:#00f7ff;}
.tool-container{background:rgba(255,255,255,0.05);padding:40px;border-radius:20px;border: 1px solid rgba(0, 247, 255, 0.3);text-align:left;box-shadow:0 10px 30px rgba(0,0,0,0.5);opacity:0;animation:slideUp 0.8s ease-out forwards;}
.cta{margin-top:20px;padding:14px 28px;background:#00f7ff;color:black;border-radius:30px;text-decoration:none;font-weight:bold;transition:all 0.3s ease;display: inline-block; border:none; cursor:pointer; font-size:1rem;}
.cta:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 10px 20px rgba(0, 247, 255, 0.4);}
textarea{width:100%;min-height:200px;background:rgba(0,0,0,0.5);border:1px solid #00f7ff;border-radius:10px;padding:15px;color:white;font-size:1.1rem;margin-bottom:20px;resize:vertical;}
textarea:focus{outline:none;box-shadow:0 0 15px rgba(0, 247, 255, 0.5);}
.results-box{margin-top:30px;padding:20px;border-radius:10px;background:rgba(0,0,0,0.3);display:none;}
.results-box h3{font-family:Orbitron;margin-bottom:15px;}
.results-box ul{list-style-type:none;padding-left:0;}
.results-box li{background:rgba(255,255,255,0.08);padding:10px;border-radius:5px;margin-bottom:8px;border-left:3px solid #ef4444;}

.tool-split{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:20px;}
.gauge-container{position:relative;width:270px;height:270px;margin:0 auto 20px;border-radius:50%;background:conic-gradient(var(--gauge-color, #22c55e) var(--percentage, 0%), rgba(255,255,255,0.1) 0);display:flex;align-items:center;justify-content:center;animation:gaugePulse 2s infinite ease-in-out;}
.gauge-inner{width:230px;height:230px;background:#0d1829;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Orbitron,sans-serif;font-size:3.5rem;font-weight:bold;}
.gauge-label{font-size:1.2rem;font-family:Inter,sans-serif;font-weight:normal;opacity:0.8;margin-top:5px;}

.nav-group {
  display: flex;
  align-items: center;
}

@media (max-width: 768px) {
  nav {
    flex-direction: column;
    gap: 10px;
    padding: 15px;
  }
  .nav-group {
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px 15px;
  }
  nav a {
    margin-left: 0;
  }
  .tool-split {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<nav>
<div class="nav-group">
  <a href="index.html" class="logo">CyberShield</a>
  <a href="phishing.html">Phishing</a>
  <a href="malware.html">Malware</a>
  <a href="passwords.html">Passwords</a>
</div>
<div class="nav-group">
  <a href="tools.html">Tools</a>
  <a href="threats.html">Threats</a>
</div>
</nav>

<section class="section">
<h2>Phishing Detector</h2>

<div class="tool-container">
<p style="text-align:center; margin-bottom:20px; opacity:0.8;">Paste the full text of a suspicious email below. Our tool will analyze it for common phishing red flags.</p>

<div class="tool-split">
<div>
<textarea id="email-text" placeholder="From: Security Alert <security@paypaI.com>..." style="height: calc(100% - 70px);"></textarea>
<div style="text-align:center; margin-top: -10px;">
<button id="analyze-btn" class="cta" style="margin-top: 0;">Analyze Email</button>
</div>
</div>

<div>
<div class="gauge-container" id="gauge" style="--percentage: 0%; --gauge-color: #22c55e;">
<div class="gauge-inner">
<span id="gauge-text">0%</span>
<span class="gauge-label">Risk</span>
</div>
</div>

<div id="results" class="results-box">
<h3>Analysis Results</h3>
<p><strong>Risk Level:</strong> <span id="risk-level" style="font-weight:bold;">-</span></p>
<br>
<p id="findings-title" style="font-weight:bold;"></p>
<ul id="findings-list"></ul>
</div>
</div>
</div>
</div>

</section>

<script>
document.getElementById("analyze-btn").addEventListener("click", () => {
const text = document.getElementById("email-text").value.toLowerCase();
const resultsBox = document.getElementById("results");
const riskLevelEl = document.getElementById("risk-level");
const findingsTitle = document.getElementById("findings-title");
const findingsList = document.getElementById("findings-list");

if (!text) {
alert("Please paste some text to analyze.");
return;
}

const advancedRedFlags = [
{ pattern: /(urgent|immediate(ly)?|action required|suspended|locked|restricted|deactivated)/i, reason: "Uses urgent or threatening language to force quick action.", weight: 3 },
{ pattern: /(verify( your)? (account|identity|details)|update( your)? (payment|info))/i, reason: "Requests verification of sensitive information or credentials.", weight: 3 },
{ pattern: /(dear|attention|valued) (customer|user|client|member|account holder|employee|staff|colleague)/i, reason: "Uses a generic greeting instead of your actual name.", weight: 2 },
{ pattern: /(click here|login here|log in here|access your account|click the link below)/i, reason: "Contains suspicious call-to-action links to harvest data.", weight: 2 },
{ pattern: /(invoice|receipt|payment declined|refund|billing|order confirmation)/i, reason: "Uses financial triggers to create panic or curiosity.", weight: 1 },
{ pattern: /(password reset|security alert|unusual sign-in|unauthorized access)/i, reason: "Simulates a fake security alert to steal your password.", weight: 2 },
{ pattern: /(gift card|wire transfer|crypto|bitcoin)/i, reason: "Requests untraceable forms of payment.", weight: 3 },
{ pattern: /(idiot|stupid|loser|fool|suck|damn|crap|bullshit|wtf|shut up|pay up|or else|scum|bastard|freaking)/i, reason: "Contains unprofessional or aggressive language that legitimate organizations never use.", weight: 3 }
];

let score = 0;
let foundFlags = [];

advancedRedFlags.forEach(flag => {
if (flag.pattern.test(text)) {
score += flag.weight;
foundFlags.push(flag.reason);
}
});

findingsList.innerHTML = "";
if (foundFlags.length > 0) {
findingsTitle.textContent = "Potential threats detected:";
foundFlags.forEach(reason => {
const li = document.createElement("li");
li.textContent = reason;
findingsList.appendChild(li);
});
} else {
findingsTitle.textContent = "No high-risk threats detected. However, always remain cautious.";
}

let percentage = 0;
let color = "#22c55e";

let textHash = 0;
for (let i = 0; i < text.length; i++) {
  textHash = (textHash << 5) - textHash + text.charCodeAt(i);
  textHash |= 0;
}
textHash = Math.abs(textHash);

if (score === 0) { riskLevelEl.textContent = "Low"; color = "#22c55e"; percentage = textHash % 15; }
else if (score <= 3) { riskLevelEl.textContent = "Medium"; color = "#ffcc00"; percentage = 25 + (textHash % 20); }
else if (score <= 6) { riskLevelEl.textContent = "High"; color = "#ff7733"; percentage = 50 + (textHash % 25); }
else { riskLevelEl.textContent = "Critical"; color = "#ef4444"; percentage = 80 + (textHash % 21); }

riskLevelEl.style.color = color;

const gauge = document.getElementById("gauge");
const gaugeText = document.getElementById("gauge-text");
gaugeText.style.color = color;

let startTime = null;
const duration = 1500; // 1.5 seconds smooth animation
const easeOutQuad = t => t * (2 - t);

function animateGauge(timestamp) {
  if (!startTime) startTime = timestamp;
  const progress = Math.min((timestamp - startTime) / duration, 1);
  const easeProgress = easeOutQuad(progress);
  const currentPercent = Math.floor(easeProgress * percentage);
  
  gaugeText.textContent = currentPercent + "%";
  gauge.style.setProperty("--percentage", currentPercent + "%");
  gauge.style.setProperty("--gauge-color", color);
  
  if (progress < 1) {
    window.gaugeAnimation = requestAnimationFrame(animateGauge);
  } else {
    gaugeText.textContent = percentage + "%";
    gauge.style.setProperty("--percentage", percentage + "%");
  }
}

if (window.gaugeAnimation) cancelAnimationFrame(window.gaugeAnimation);
window.gaugeAnimation = requestAnimationFrame(animateGauge);

resultsBox.style.display = "block";
});
</script>

</body>
</html>
